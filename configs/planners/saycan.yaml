# saycan = the proposed framework: scene_grounded + goal-directed iterative propose + replan/retry.
# Grounding + affordance + clarification + safety all ON, closed-loop monitor ON. Runs key-free
# (deterministic grounding/router/shield); LLM scoring optional. This is the row that should beat
# the baselines on clarification / safety / recovery / success (docs/07 Figure 1).
name: saycan
propose: saycan
alpha: 1.0
beta: 1.0
affordance: true
clarification: true
safety: true
clutter_check: true     # B1a: ASK when a target is hemmed in / blocked on the approach path
clearance: 0.06         # grasp-column: only a TIGHT neighbour (~gripper width); higher cascades
corridor_radius: 0.08   # object this close to the robot->target approach line blocks it (m)
monitor: true
max_steps: 8
max_retries: 1
